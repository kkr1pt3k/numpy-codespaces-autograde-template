name: Autograding Tests

on:
  push:
    branches: [ main ]
  repository_dispatch:

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest and generate JSON report
        run: |
          pytest tests/test_numpy_programming_exercises.py \
            --json-report \
            --json-report-file=report.json || true

      - name: Compute grade
        run: |
          python scripts/grade_report.py
